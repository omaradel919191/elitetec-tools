# EliteTec Tools — production stack (isolated; reuses the host's Traefik).
# No published host ports: Traefik routes to the container over the shared
# network. Set DOMAIN / TRAEFIK_NETWORK / CERT_RESOLVER in .env to match the VPS.
name: elitetec-tools-prod

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: elitetec-tools-web:latest
    container_name: elitetec-tools-prod-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-n8n_default}"
      # Canonical host — eliteteconline.com serves the app (also required so
      # AdSense's ads.txt lives at the root domain, not a subdomain).
      - "traefik.http.routers.elitetectools.rule=Host(`${DOMAIN:-eliteteconline.com}`)"
      - "traefik.http.routers.elitetectools.entrypoints=websecure"
      - "traefik.http.routers.elitetectools.tls=true"
      - "traefik.http.routers.elitetectools.tls.certresolver=${CERT_RESOLVER:-mytlschallenge}"
      - "traefik.http.services.elitetectools.loadbalancer.server.port=3000"
      # www. and the old tools. subdomain permanently redirect to the
      # canonical root host (avoids duplicate content across hostnames).
      - 'traefik.http.middlewares.elitetectools-redirect.redirectregex.regex=^https://(?:www\.eliteteconline\.com|tools\.eliteteconline\.com)(.*)'
      - 'traefik.http.middlewares.elitetectools-redirect.redirectregex.replacement=https://eliteteconline.com$${1}'
      - "traefik.http.middlewares.elitetectools-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.elitetectools-redirect.rule=Host(`www.eliteteconline.com`) || Host(`tools.eliteteconline.com`)"
      - "traefik.http.routers.elitetectools-redirect.entrypoints=websecure"
      - "traefik.http.routers.elitetectools-redirect.tls=true"
      - "traefik.http.routers.elitetectools-redirect.tls.certresolver=${CERT_RESOLVER:-mytlschallenge}"
      - "traefik.http.routers.elitetectools-redirect.middlewares=elitetectools-redirect"
      - "traefik.http.routers.elitetectools-redirect.service=elitetectools"

networks:
  default:
    name: ${TRAEFIK_NETWORK:-n8n_default}
    external: true
